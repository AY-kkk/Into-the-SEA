# 一键本地 PostgreSQL（真实数据库）。
# 用法：
#   docker compose up -d
#   在 .env 设置 DATA_SOURCE=db 与 DATABASE_URL（见 .env.example）
#   pnpm prisma:generate && pnpm prisma db push && pnpm db:seed
services:
  db:
    image: postgres:16-alpine
    container_name: into-the-sea-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: into_the_sea
      POSTGRES_PASSWORD: into_the_sea
      POSTGRES_DB: into_the_sea
    ports:
      - '5432:5432'
    volumes:
      - into_the_sea_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U into_the_sea']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  into_the_sea_pg:
